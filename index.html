<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didacticiel TIC - Level System Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Caveat:wght@600;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            transition: background-color 0.8s ease;
        }
        
        /* Police stylisée pour le développeur */
        .dev-signature {
            font-family: 'Caveat', cursive;
        }

        /* Style de scrollbar moderne et discret */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        /* CHUTE DE FLEURS REELLES (EN ARRIÈRE-PLAN : z-index: 5) */
        @keyframes fallFlower {
            0% {
                transform: translateY(-20vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            15% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(115vh) rotate(360deg) scale(1.1);
                opacity: 0;
            }
        }

        .flower-item {
            position: absolute;
            top: 0;
            pointer-events: none;
            z-index: 5;
            animation: fallFlower 7s linear infinite;
        }

        /* EFFET PLUIE POUR L'ÉCHEC (EN ARRIÈRE-PLAN) */
        @keyframes fallRain {
            0% {
                transform: translateY(-10vh) translateX(0);
                opacity: 0.2;
            }
            100% {
                transform: translateY(110vh) translateX(-10px);
                opacity: 0.8;
            }
        }

        .rain-drop {
            position: absolute;
            background: linear-gradient(transparent, #38bdf8);
            width: 1.5px;
            height: 35px;
            opacity: 0.7;
            z-index: 5;
            pointer-events: none;
            animation: fallRain 1.2s linear infinite;
        }

        /* Tremblement d'écran en cas d'échec */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        .shake-element {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
